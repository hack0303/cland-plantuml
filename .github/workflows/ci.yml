name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew check --no-daemon

      - name: Package distribution
        run: ./gradlew assembleDist --no-daemon

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: cland-plantuml-dist
          path: app/build/distributions/

  scan-and-render:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Scan own source code and render
        run: |
          ./gradlew :app:installDist --no-daemon
          ./app/build/install/cland-plantuml/bin/cland-plantuml \
            app/src/main/java \
            -o build/ci-output \
            --sequence \
            --render \
            -v

      - name: Upload generated diagrams
        uses: actions/upload-artifact@v4
        with:
          name: generated-diagrams
          path: build/ci-output/
