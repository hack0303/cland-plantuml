 * https://github.com/cbmarcum/skeletal
 */

plugins {
    // Apply the groovy plugin to also add support for Groovy (needed for Spock)
    id 'groovy'

    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

// group and version used for application 
group = "org.cland.plantuml"
version = "0.1.0"


repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // CLI argument parsing
    implementation 'info.picocli:picocli:4.7.6'

    // PlantUML for rendering .puml → PNG
    implementation 'net.sourceforge.plantuml:plantuml-gplv2:1.2025.0'

    // Java AST parsing
    implementation 'com.github.javaparser:javaparser-core:3.26.2'

    // Logging
    implementation 'org.slf4j:slf4j-api:2.0.16'
    implementation 'ch.qos.logback:logback-classic:1.5.21'

    // Use the latest Groovy version for Spock testing
    testImplementation 'org.apache.groovy:groovy:4.0.29'
    testImplementation 'org.spockframework:spock-core:2.4-M7-groovy-4.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'ch.qos.logback:logback-classic:1.5.21'
    testImplementation( "com.athaydes:spock-reports:2.5.1-groovy-4.0" ) {
        transitive = false
    }
    testImplementation "org.apache.groovy:groovy-xml:4.0.29"
    testImplementation "org.apache.groovy:groovy-json:4.0.29"
    testImplementation "org.apache.groovy:groovy-templates:4.0.29"
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.release = 25
}

tasks.withType(GroovyCompile).configureEach {
    sourceCompatibility = '25'
    targetCompatibility = '25'
}

jar {
    // archive name before version
    archiveBaseName = 'cland-plantuml'
}

application {
    // Define the main class for the application.
    mainClass = 'org.cland.plantuml.ClandPlantuml'
    // Define the application command name
    applicationName = 'cland-plantuml'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()

    // spock reports
    systemProperty 'com.athaydes.spockframework.report.showCodeBlocks', true
}
